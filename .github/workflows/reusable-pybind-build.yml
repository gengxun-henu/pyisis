name: reusable-pybind-build

on:
  workflow_call:
    secrets:
      ACTIONS_CHECKOUT_SSH_KEY:
        required: true
    inputs:
      artifact-prefix:
        description: Prefix used for build/smoke artifact names.
        required: true
        type: string
      fallback-conda-prefix:
        description: Fallback local conda prefix used on self-hosted runners.
        required: true
        type: string
      pybind-dir:
        description: Repository-relative source directory passed to cmake -S.
        required: false
        default: .
        type: string
      build-dir:
        description: Repository-relative build output directory.
        required: false
        default: build
        type: string
      run-smoke-import:
        description: Whether to run tests/smoke_import.py after a successful build.
        required: false
        default: true
        type: boolean
      upload-build-artifact:
        description: Whether to upload the configured build tree for downstream jobs.
        required: false
        default: true
        type: boolean
    outputs:
      build-artifact-name:
        description: Uploaded build tree artifact name.
        value: ${{ jobs.build.outputs.build_artifact_name }}
      build-log-artifact-name:
        description: Uploaded build log artifact name.
        value: ${{ jobs.build.outputs.build_log_artifact_name }}
      smoke-log-artifact-name:
        description: Uploaded smoke log artifact name.
        value: ${{ jobs.smoke-import.outputs.smoke_log_artifact_name }}
      build-succeeded:
        description: Whether the configure/build stage succeeded.
        value: ${{ jobs.build.outputs.build_succeeded }}
      smoke-succeeded:
        description: Whether smoke_import.py succeeded when enabled.
        value: ${{ jobs.smoke-import.outputs.smoke_succeeded }}

jobs:
  build:
    name: Reusable build
    runs-on: self-hosted
    timeout-minutes: 120
    permissions:
      contents: read
    outputs:
      build_artifact_name: ${{ steps.artifact-names.outputs.build_artifact_name }}
      build_log_artifact_name: ${{ steps.artifact-names.outputs.build_log_artifact_name }}
      build_succeeded: ${{ steps.mark-build.outputs.build_succeeded }}
    env:
      PYBIND_DIR: ${{ inputs.pybind-dir }}
      BUILD_DIR: ${{ inputs.build-dir }}
      PYTHONUNBUFFERED: "1"
      FALLBACK_CONDA_PREFIX: ${{ inputs.fallback-conda-prefix }}
    steps:
      - name: Configure GitHub SSH transport
        shell: bash
        env:
          ACTIONS_CHECKOUT_SSH_KEY: ${{ secrets.ACTIONS_CHECKOUT_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${ACTIONS_CHECKOUT_SSH_KEY:-}" ]; then
            echo "::error::Missing secret ACTIONS_CHECKOUT_SSH_KEY. This workflow requires SSH checkout via ssh.github.com:443."
            exit 1
          fi
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          python3 - <<'PY'
          from pathlib import Path

          config_path = Path.home() / ".ssh" / "config"
          begin_marker = "# BEGIN github-actions github ssh\n"
          end_marker = "# END github-actions github ssh\n"
          managed_block = (
              begin_marker
              + "Host github.com\n"
              + "  HostName ssh.github.com\n"
              + "  Port 443\n"
              + "  User git\n"
              + "  IdentitiesOnly yes\n"
              + "  StrictHostKeyChecking no\n"
              + end_marker
          )

          existing = config_path.read_text(encoding="utf-8") if config_path.exists() else ""
          while begin_marker in existing and end_marker in existing:
              start = existing.index(begin_marker)
              end = existing.index(end_marker, start) + len(end_marker)
              existing = existing[:start] + existing[end:]
          existing = existing.lstrip("\n")
          updated = managed_block if not existing else managed_block + "\n" + existing
          config_path.write_text(updated, encoding="utf-8")
          PY
          chmod 600 "$HOME/.ssh/config"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.ACTIONS_CHECKOUT_SSH_KEY }}
          ssh-strict: false
          persist-credentials: true
          fetch-depth: 0

      - name: Compute artifact names
        id: artifact-names
        shell: bash
        run: |
          set -euo pipefail
          echo "build_artifact_name=${{ inputs.artifact-prefix }}-build-tree-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          echo "build_log_artifact_name=${{ inputs.artifact-prefix }}-build-logs-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Resolve conda-backed ISIS prefix
        uses: ./.github/actions/resolve-conda-isis-prefix
        with:
          fallback-conda-prefix: ${{ env.FALLBACK_CONDA_PREFIX }}

      - name: Verify local toolchain
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Local environment verification ==="
          echo "CONDA_PREFIX=$CONDA_PREFIX"
          test -d "$CONDA_PREFIX/include/isis" && echo "✓ ISIS headers found"
          test -f "$CONDA_PREFIX/lib/libisis.so" && echo "✓ libisis.so found"
          test -f "$CONDA_PREFIX/lib/Camera.plugin" && echo "✓ Camera.plugin found"
          command -v cmake
          cmake --version
          command -v ninja
          ninja --version
          "$PYTHON_BIN" --version
          "$PYTHON_BIN" - <<'PY'
          import pybind11
          import sys
          print('python', sys.version.split()[0])
          print('pybind11', pybind11.__version__)
          PY

      - name: Clean build directory
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$BUILD_DIR"

      - name: Configure CMake
        shell: bash
        run: |
          set -euo pipefail
          cmake -S "$PYBIND_DIR" -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_VERBOSE_MAKEFILE=ON \
            -DCMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH" \
            -DPython3_EXECUTABLE="$PYTHON_BIN" \
            -DISIS_PREFIX="$ISIS_PREFIX"

      - name: Build extension
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          cmake --build "$BUILD_DIR" --parallel 2 --verbose -- -k 0 2>&1 | tee "$BUILD_DIR/build.log"

      - name: Mark build success
        if: ${{ success() }}
        id: mark-build
        shell: bash
        run: |
          set -euo pipefail
          echo "build_succeeded=true" >> "$GITHUB_OUTPUT"

      - name: Summarize build failure
        if: ${{ failure() }}
        shell: bash
        run: |
          set -euo pipefail
          "$PYTHON_BIN" scripts/build_log_analyzer.py "$BUILD_DIR/build.log"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-names.outputs.build_log_artifact_name }}
          if-no-files-found: warn
          path: |
            ${{ env.BUILD_DIR }}/build.log
            ${{ env.BUILD_DIR }}/CMakeCache.txt
            ${{ env.BUILD_DIR }}/CMakeFiles/CMakeOutput.log
            ${{ env.BUILD_DIR }}/CMakeFiles/CMakeError.log
            ${{ env.BUILD_DIR }}/Testing/Temporary/**

      - name: Upload build artifact
        if: ${{ success() && inputs.upload-build-artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-names.outputs.build_artifact_name }}
          path: ${{ env.BUILD_DIR }}
          if-no-files-found: error

  smoke-import:
    name: Reusable smoke import
    if: ${{ inputs.run-smoke-import }}
    needs: build
    runs-on: self-hosted
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      smoke_log_artifact_name: ${{ steps.artifact-names.outputs.smoke_log_artifact_name }}
      smoke_succeeded: ${{ steps.mark-smoke.outputs.smoke_succeeded }}
    env:
      BUILD_DIR: ${{ inputs.build-dir }}
      PYTHONUNBUFFERED: "1"
      FALLBACK_CONDA_PREFIX: ${{ inputs.fallback-conda-prefix }}
    steps:
      - name: Configure GitHub SSH transport
        shell: bash
        env:
          ACTIONS_CHECKOUT_SSH_KEY: ${{ secrets.ACTIONS_CHECKOUT_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${ACTIONS_CHECKOUT_SSH_KEY:-}" ]; then
            echo "::error::Missing secret ACTIONS_CHECKOUT_SSH_KEY. This workflow requires SSH checkout via ssh.github.com:443."
            exit 1
          fi
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          python3 - <<'PY'
          from pathlib import Path

          config_path = Path.home() / ".ssh" / "config"
          begin_marker = "# BEGIN github-actions github ssh\n"
          end_marker = "# END github-actions github ssh\n"
          managed_block = (
              begin_marker
              + "Host github.com\n"
              + "  HostName ssh.github.com\n"
              + "  Port 443\n"
              + "  User git\n"
              + "  IdentitiesOnly yes\n"
              + "  StrictHostKeyChecking no\n"
              + end_marker
          )

          existing = config_path.read_text(encoding="utf-8") if config_path.exists() else ""
          while begin_marker in existing and end_marker in existing:
              start = existing.index(begin_marker)
              end = existing.index(end_marker, start) + len(end_marker)
              existing = existing[:start] + existing[end:]
          existing = existing.lstrip("\n")
          updated = managed_block if not existing else managed_block + "\n" + existing
          config_path.write_text(updated, encoding="utf-8")
          PY
          chmod 600 "$HOME/.ssh/config"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.ACTIONS_CHECKOUT_SSH_KEY }}
          ssh-strict: false
          persist-credentials: true
          fetch-depth: 0

      - name: Compute smoke artifact name
        id: artifact-names
        shell: bash
        run: |
          set -euo pipefail
          echo "smoke_log_artifact_name=${{ inputs.artifact-prefix }}-smoke-logs-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Resolve conda-backed ISIS prefix
        uses: ./.github/actions/resolve-conda-isis-prefix
        with:
          fallback-conda-prefix: ${{ env.FALLBACK_CONDA_PREFIX }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.build_artifact_name }}
          path: ${{ env.BUILD_DIR }}

      - name: Run smoke_import.py
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          PYTHONPATH="$BUILD_DIR/python${PYTHONPATH:+:$PYTHONPATH}" \
            "$PYTHON_BIN" -X faulthandler tests/smoke_import.py 2>&1 | tee "$BUILD_DIR/smoke.log"

      - name: Mark smoke success
        if: ${{ success() }}
        id: mark-smoke
        shell: bash
        run: |
          set -euo pipefail
          echo "smoke_succeeded=true" >> "$GITHUB_OUTPUT"

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-names.outputs.smoke_log_artifact_name }}
          if-no-files-found: warn
          path: ${{ env.BUILD_DIR }}/smoke.log
