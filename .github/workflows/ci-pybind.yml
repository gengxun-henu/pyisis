name: ci-pybind

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/ci-pybind.yml
      - Github_actions_build_test_steps.md
      - CMakeLists.txt
      - python/**
      - src/**
      - tests/**
  pull_request:
    paths:
      - .github/workflows/ci-pybind.yml
      - Github_actions_build_test_steps.md
      - CMakeLists.txt
      - python/**
      - src/**
      - tests/**

concurrency:
  group: ci-pybind-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test isis_pybind_standalone
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      contents: read

    env:
      PYBIND_DIR: .
      BUILD_DIR: build
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: asp360_new
          cache-environment: true
          cache-downloads: true
          init-shell: bash

      - name: Install ISIS
        shell: bash -l {0}
        run: |
          micromamba activate asp360_new
          micromamba install -n asp360_new -y \
            -c conda-forge \
            -c usgs-astrogeology \
            "isis=9.0.0"

      - name: Verify ISIS installation and output information
        shell: bash -l {0}
        run: |
          micromamba activate asp360_new
          echo "=== ISIS Installation Verification ==="
          echo "CONDA_PREFIX: $CONDA_PREFIX"
          echo ""
          echo "=== Checking ISIS directories and files ==="
          test -d "$CONDA_PREFIX/include/isis" && echo "✓ ISIS include directory found: $CONDA_PREFIX/include/isis"
          test -f "$CONDA_PREFIX/lib/libisis.so" && echo "✓ ISIS library found: $CONDA_PREFIX/lib/libisis.so"
          test -f "$CONDA_PREFIX/lib/Camera.plugin" && echo "✓ Camera plugin found: $CONDA_PREFIX/lib/Camera.plugin"
          echo ""
          echo "=== Python version provided by ISIS ==="
          which python
          python --version
          echo ""
          echo "=== ISIS environment packages ==="
          micromamba list | grep -E "(isis|python|pybind)" || true
          echo ""
          echo "=== ISIS installation verified successfully ==="

      - name: Install pybind11
        shell: bash -l {0}
        run: |
          micromamba activate asp360_new
          echo "=== Installing pybind11 ==="
          micromamba install -y pybind11
          echo "=== pybind11 installation completed ==="
          pybind11-config --version || echo "pybind11-config not found in PATH"

      - name: Verify external ISIS prefix
        shell: bash -l {0}
        run: |
          micromamba activate asp360_new
          echo "CONDA_PREFIX=$CONDA_PREFIX" >> "$GITHUB_ENV"
          echo "ISIS_PREFIX=$CONDA_PREFIX" >> "$GITHUB_ENV"
          echo "ISISROOT=$CONDA_PREFIX" >> "$GITHUB_ENV"
          echo "ISISDATA=$GITHUB_WORKSPACE/tests/data/isisdata/mockup" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$CONDA_PREFIX/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

          test -d "$CONDA_PREFIX/include/isis"
          test -f "$CONDA_PREFIX/lib/libisis.so"
          test -f "$CONDA_PREFIX/lib/Camera.plugin"

      - name: Show toolchain summary
        shell: bash -l {0}
        run: |
          micromamba activate asp360_new
          python --version
          cmake --version
          ninja --version

      - name: Clean build directory
        run: rm -rf "$BUILD_DIR"

      - name: Configure CMake
        shell: bash -l {0}
        run: |
          micromamba activate asp360_new
          cmake -S "$PYBIND_DIR" -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$CONDA_PREFIX" \
            -DPython3_EXECUTABLE="$CONDA_PREFIX/bin/python" \
            -DISIS_PREFIX="$CONDA_PREFIX"

      - name: Build extension
        shell: bash -l {0}
        run: |
          micromamba activate asp360_new
          cmake --build "$BUILD_DIR" --parallel 2

      - name: Run CTest suite
        shell: bash -l {0}
        run: |
          micromamba activate asp360_new
          ctest --test-dir "$BUILD_DIR" --output-on-failure -V

      - name: Run smoke import
        shell: bash -l {0}
        run: |
          micromamba activate asp360_new
          PYTHONPATH="$BUILD_DIR/python${PYTHONPATH:+:$PYTHONPATH}" \
            "$CONDA_PREFIX/bin/python" "$PYBIND_DIR/tests/smoke_import.py"
