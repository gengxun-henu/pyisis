name: "Pybind task"
description: "Track one pybind binding task for exactly one upstream ISIS C++ class or one related method cluster."
title: "[pybind] "
labels:
  - pybind-task
body:
  - type: markdown
    attributes:
      value: |
        Use this issue for **one** upstream ISIS C++ class or **one** related method cluster only.

        This template opens the issue with `pybind-task` only.
        Add `ready-for-agent` **after** a quick human review confirms the scope is actionable.
        Once that label is applied, repository automation will create or refresh a bootstrap branch and open a draft PR for the task before validation is dispatched.

        Rules for this task:
        - one GitHub agent task = one class or one method cluster
        - must add the smallest relevant unit test
        - must pass build + unit + smoke
        - automated repair budget = 5 attempts maximum
        - if attempt 5 still fails, write blocker summary, label it, and stop this task

        Minimal fast-path:
        - you may submit this form with only the target class filled in
        - the repository automation will try to infer the remaining context from local inventory files
        - if the inference is incomplete or ambiguous, edit the suggested sections manually before adding `ready-for-agent`
        - after `ready-for-agent`, push coding changes to the automation-created draft PR branch for this issue

  - type: input
    id: target_class
    attributes:
      label: Target upstream class
      description: Name the upstream ISIS C++ class for this task.
      placeholder: Cube
    validations:
      required: true

  - type: textarea
    id: target_scope
    attributes:
      label: Task scope
      description: Describe the exact method cluster or bug-fix scope. Keep it narrow. You may leave this blank and let automation suggest a first draft.
      placeholder: |
        Only handle these methods:
        - set_base_multiplier
        - base
        - multiplier

  - type: textarea
    id: upstream_paths
    attributes:
      label: Upstream source paths
      description: Use repository-relative paths under reference/upstream_isis. You may leave this blank for auto-suggestions.
      placeholder: |
        reference/upstream_isis/.../Cube.h
        reference/upstream_isis/.../Cube.cpp
        reference/upstream_isis/.../Cube/unitTest.cpp

  - type: textarea
    id: local_context
    attributes:
      label: Local repository files to inspect first
      description: List the local inventory, binding, and test files that should be read first. You may leave this blank for auto-suggestions.
      placeholder: |
        todo_pybind11.csv
        class_bind_methods_details/methods_inventory_summary.csv
        class_bind_methods_details/base_cube_methods.csv
        src/...
        tests/unitTest/...

  - type: textarea
    id: expected_changes
    attributes:
      label: Expected file changes
      description: List the files likely to change for binding, tests, exports, and progress tracking. You may leave this blank for auto-suggestions.
      placeholder: |
        src/...
        tests/unitTest/..._unit_test.py
        python/isis_pybind/__init__.py
        pybind_progress_log.md

  - type: textarea
    id: minimal_validation
    attributes:
      label: Minimal validation plan
      description: Specify the smallest build/test/smoke path that should be run. You may leave this blank for auto-suggestions.
      placeholder: |
        1. Build extension
        2. Run the targeted unit test file
        3. Run tests/smoke_import.py

  - type: input
    id: unit_test_target
    attributes:
      label: Unit test target (optional)
      description: Optional unittest module or test case path used by the automated dispatch workflow. Leave blank to let automation suggest one.
      placeholder: tests.unitTest.cube_unit_test or cube_unit_test.CubeBaseMultiplierTest
    validations:
      required: false

  - type: checkboxes
    id: done_definition
    attributes:
      label: Definition of done
      options:
        - label: Only one upstream class or one related method cluster is in scope
        - label: The task includes the smallest relevant unit test update
        - label: The task must pass build + unit + smoke before completion
        - label: Progress and inventory files must be updated if the binding surface changed
        - label: If automated repair reaches 5 failed attempts, this task must be marked blocked and stopped

  - type: textarea
    id: blocker_template
    attributes:
      label: Blocker summary template
      description: Fill this only if the task becomes blocked.
      placeholder: |
        Attempt count:
        Last failing step:
        Most likely root cause:
        Classification: binding bug / test bug / environment / upstream behavior / unknown
        Recommended next human action:

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Optional initial priority. Leave blank if you want the autofill workflow to set a default suggestion.
      options:
        - high
        - medium
        - low
