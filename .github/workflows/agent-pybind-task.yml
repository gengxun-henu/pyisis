name: agent-pybind-task

on:
  workflow_dispatch:
    inputs:
      target_class:
        description: "One upstream ISIS class name, for example BoxcarManager"
        required: true
        type: string
      issue_number:
        description: "Optional GitHub issue number for this task"
        required: false
        default: ""
        type: string
      attempt:
        description: "Automated repair attempt number (1-5)"
        required: false
        default: "1"
        type: string
      unit_test_target_override:
        description: "Optional unittest target override, for example tests/unitTest/cube_unit_test.py or cube_unit_test.CubeBaseMultiplierTest"
        required: false
        default: ""
        type: string
      git_ref:
        description: "Optional git branch or ref to validate instead of the dispatch SHA"
        required: false
        default: ""
        type: string
      pull_request_number:
        description: "Optional existing pull request number associated with this task"
        required: false
        default: ""
        type: string
      runner_profile:
        description: "Optional runner profile override for manual dispatch: self-hosted-http, self-hosted-watt, self-hosted-ssh, github-hosted"
        required: false
        default: ""
        type: string

concurrency:
  group: agent-pybind-task-${{ github.ref }}-${{ inputs.target_class }}-${{ inputs.issue_number || 'manual' }}
  cancel-in-progress: true

jobs:
  resolve_runner:
    name: Resolve runner mode
    uses: ./.github/workflows/reusable-runner-config.yml
    with:
      runner_profile: ${{ inputs.runner_profile }}

  pybind-task:
    name: Resolve, build, and validate
    needs: resolve_runner
    runs-on: ${{ fromJSON(needs.resolve_runner.outputs.runs_on_json) }}
    timeout-minutes: 240
    permissions:
      contents: read
      issues: write
      pull-requests: write
    env:
      PYBIND_DIR: .
      BUILD_DIR: build
      PYTHONUNBUFFERED: "1"
      FALLBACK_CONDA_PREFIX: ${{ needs.resolve_runner.outputs.fallback_conda_prefix }}
      GH_TOKEN: ${{ github.token }}
      REQUESTED_RUNNER_PROFILE: ${{ inputs.runner_profile }}
      SELECTED_RUNNER_PROFILE: ${{ needs.resolve_runner.outputs.runner_profile }}
      SELECTED_NETWORK_PROFILE: ${{ needs.resolve_runner.outputs.network_profile }}
      SELECTED_USE_WATT: ${{ needs.resolve_runner.outputs.use_watt }}
      SELECTED_RUNNER_MODE: ${{ needs.resolve_runner.outputs.runner_mode }}
      HOSTED_CONDA_PREFIX: ${{ github.workspace }}/.micromamba/envs/asp360_new
    steps:
      - name: Validate retry budget
        shell: bash
        run: |
          set -euo pipefail
          attempt="${{ inputs.attempt }}"
          if ! [[ "$attempt" =~ ^[0-9]+$ ]]; then
            echo "attempt must be an integer" >&2
            exit 1
          fi
          if [ "$attempt" -lt 1 ] || [ "$attempt" -gt 5 ]; then
            echo "attempt must be between 1 and 5" >&2
            exit 1
          fi
          echo "Attempt $attempt / 5 accepted"

      - name: Report selected runner profile
        shell: bash
        run: |
          set -euo pipefail
          echo "Requested runner profile override: ${REQUESTED_RUNNER_PROFILE:-<none>}"
          echo "Selected runner profile: ${SELECTED_RUNNER_PROFILE}"
          echo "Selected runner mode: ${SELECTED_RUNNER_MODE}"
          echo "Selected network profile: ${SELECTED_NETWORK_PROFILE}"
          echo "Selected use_watt: ${SELECTED_USE_WATT}"
          echo "Requested git ref override: ${{ inputs.git_ref || '<none>' }}"
          echo "Associated pull request: ${{ inputs.pull_request_number || 'n/a' }}"

          {
            echo "## Runner selection"
            echo ""
            echo "- requested runner profile override: \`${REQUESTED_RUNNER_PROFILE:-<none>}\`"
            echo "- selected runner profile: \`${SELECTED_RUNNER_PROFILE}\`"
            echo "- selected runner mode: \`${SELECTED_RUNNER_MODE}\`"
            echo "- selected network profile: \`${SELECTED_NETWORK_PROFILE}\`"
            echo "- selected use_watt: \`${SELECTED_USE_WATT}\`"
            echo "- requested git ref override: \`${{ inputs.git_ref || '<none>' }}\`"
            echo "- associated pull request: \`${{ inputs.pull_request_number || 'n/a' }}\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install workflow helpers
        shell: bash
        run: |
          set -euo pipefail
          helper_path="$RUNNER_TEMP/agent_pybind_helpers.sh"
          cat > "$helper_path" <<'EOF'
          retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            local delay=5
            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${attempt} attempts: $*" >&2
                return 1
              fi
              echo "Attempt ${attempt}/${max_attempts} failed, retrying in ${delay}s: $*" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          resolve_curl() {
            if command -v curl >/dev/null 2>&1; then
              command -v curl
              return 0
            fi

            if [ -n "${FALLBACK_CONDA_PREFIX:-}" ] && [ -x "${FALLBACK_CONDA_PREFIX}/bin/curl" ]; then
              printf '%s\n' "${FALLBACK_CONDA_PREFIX}/bin/curl"
              return 0
            fi

            echo "curl executable was not found in PATH or FALLBACK_CONDA_PREFIX/bin" >&2
            return 1
          }

          resolve_openssl() {
            if command -v openssl >/dev/null 2>&1; then
              command -v openssl
              return 0
            fi

            if [ -n "${FALLBACK_CONDA_PREFIX:-}" ] && [ -x "${FALLBACK_CONDA_PREFIX}/bin/openssl" ]; then
              printf '%s\n' "${FALLBACK_CONDA_PREFIX}/bin/openssl"
              return 0
            fi

            echo "openssl executable was not found in PATH or FALLBACK_CONDA_PREFIX/bin" >&2
            return 1
          }

          github_auth_header() {
            python3 -c "import base64, os; print(base64.b64encode(('x-access-token:' + os.environ['GH_TOKEN']).encode()).decode())"
          }
          EOF
          chmod 700 "$helper_path"
          echo "AGENT_PYBIND_HELPERS=$helper_path" >> "$GITHUB_ENV"

      - name: Normalize network mode for self-hosted WATT runner
        if: ${{ needs.resolve_runner.outputs.runner_mode == 'self-hosted' && needs.resolve_runner.outputs.use_watt == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "HTTP_PROXY="
            echo "HTTPS_PROXY="
            echo "http_proxy="
            echo "https_proxy="
            echo "ALL_PROXY="
            echo "all_proxy="
            echo "NO_PROXY="
            echo "no_proxy="
          } >> "$GITHUB_ENV"

      - name: Validate WATT host routing for GitHub on self-hosted runner
        if: ${{ needs.resolve_runner.outputs.runner_mode == 'self-hosted' && needs.resolve_runner.outputs.use_watt == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          source "$AGENT_PYBIND_HELPERS"
          curl_bin="$(resolve_curl)"
          openssl_bin="$(resolve_openssl)"
          auth_header="$(github_auth_header)"

          {
            echo "## WATT GitHub acceleration check"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          for host in github.com api.github.com objects.githubusercontent.com; do
            resolved_ip="$(getent hosts "$host" | awk '{print $1}' | head -n1 || true)"
            echo "$host -> ${resolved_ip:-unresolved}"
            echo "- ${host}: \`${resolved_ip:-unresolved}\`" >> "$GITHUB_STEP_SUMMARY"

            if [ -z "$resolved_ip" ]; then
              echo "::error::${host} did not resolve on this runner."
              exit 1
            fi

            if [ "$host" != "objects.githubusercontent.com" ] && [ "$resolved_ip" != "127.0.0.1" ]; then
              echo "::error::Expected ${host} to resolve to 127.0.0.1 for WATT/Steam++ routing, got ${resolved_ip}."
              exit 1
            fi
          done

          {
            echo ""
            echo "### TLS certificate probe"
            echo '```text'
            echo | "$openssl_bin" s_client -connect github.com:443 -servername github.com 2>/dev/null | "$openssl_bin" x509 -noout -issuer -subject -dates || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          retry 4 "$curl_bin" --fail --silent --show-error --location --head --connect-timeout 10 --max-time 30 https://github.com >/dev/null
          retry 4 "$curl_bin" --fail --silent --show-error --location --head --connect-timeout 10 --max-time 30 https://api.github.com >/dev/null
          retry 4 git -c http.sslVerify=true -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" HEAD >/dev/null

      - name: Report non-WATT network path
        if: ${{ !(needs.resolve_runner.outputs.runner_mode == 'self-hosted' && needs.resolve_runner.outputs.use_watt == 'true') }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Network mode"
            echo ""
            echo "- WATT-specific proxy reset and hosts validation were skipped for profile \`${SELECTED_RUNNER_PROFILE}\`."
            echo "- Effective network profile: \`${SELECTED_NETWORK_PROFILE}\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Network preflight for GitHub HTTPS endpoints
        shell: bash
        run: |
          set -euo pipefail
          source "$AGENT_PYBIND_HELPERS"
          curl_bin="$(resolve_curl)"
          auth_header="$(github_auth_header)"
          https_proxy_status="no"
          http_proxy_status="no"
          no_proxy_status="no"
          if [ -n "${HTTPS_PROXY:-}" ]; then
            https_proxy_status="yes"
          fi
          if [ -n "${HTTP_PROXY:-}" ]; then
            http_proxy_status="yes"
          fi
          if [ -n "${NO_PROXY:-}" ]; then
            no_proxy_status="yes"
          fi
          {
            echo "## Network preflight"
            echo ""
            echo "- curl executable: \`${curl_bin}\`"
            echo "- HTTPS proxy configured: `${https_proxy_status}`"
            echo "- HTTP proxy configured: `${http_proxy_status}`"
            echo "- NO_PROXY configured: `${no_proxy_status}`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          for url in \
            https://github.com \
            https://api.github.com \
            https://codeload.github.com
          do
            echo "Checking $url"
            retry 4 "$curl_bin" --fail --silent --show-error --location --head --connect-timeout 10 --max-time 30 "$url" >/dev/null
          done

          echo "Checking authenticated git HTTPS probe for ${GITHUB_REPOSITORY}"
          retry 4 git -c http.sslVerify=true -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" HEAD >/dev/null

      - name: Checkout repository over HTTPS with retry
        shell: bash
        run: |
          set -euo pipefail
          source "$AGENT_PYBIND_HELPERS"
          auth_header="$(python3 - <<'PY'
          import base64
          import os
          token = os.environ["GH_TOKEN"]
          print(base64.b64encode(f"x-access-token:{token}".encode()).decode())
          PY
          )"

          cd "$GITHUB_WORKSPACE"
          if [ -d .git ]; then
            git reset --hard >/dev/null 2>&1 || true
            git clean -ffdx >/dev/null 2>&1 || true
          fi

          git init .
          git config --local advice.detachedHead false
          git config --local gc.auto 0
          git config --local http.sslVerify true
          git config --local http.https://github.com/.extraheader "AUTHORIZATION: basic ${auth_header}"
          git remote remove origin >/dev/null 2>&1 || true
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"

          checkout_ref="${{ inputs.git_ref }}"
          if [ -n "$checkout_ref" ]; then
            echo "Fetching requested git ref: $checkout_ref"
            retry 5 git fetch --no-tags --prune --depth=1 origin "$checkout_ref"
          else
            echo "Fetching dispatch SHA: $GITHUB_SHA"
            retry 5 git fetch --no-tags --prune --depth=1 origin "$GITHUB_SHA"
          fi
          git checkout --force FETCH_HEAD
          git clean -ffdx

      - name: Ensure inventory summary exists
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f class_bind_methods_details/methods_inventory_summary.csv ]; then
            python3 class_bind_methods_details/generate_methods_csv.py
          fi

      - name: Resolve class metadata from local inventory
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import csv
          import json
          import os
          import re
          from pathlib import Path

          target = "${{ inputs.target_class }}".strip()
          override = "${{ inputs.unit_test_target_override }}".strip()
          git_ref_override = "${{ inputs.git_ref }}".strip()
          pull_request_number = "${{ inputs.pull_request_number }}".strip()
          summary_path = Path("class_bind_methods_details/methods_inventory_summary.csv")
          if not summary_path.exists():
              raise SystemExit(f"::error::Missing inventory summary: {summary_path}")

          def camel_to_snake(name: str) -> str:
              s1 = re.sub(r"(.)([A-Z][a-z]+)", r"\1_\2", name)
              s2 = re.sub(r"([a-z0-9])([A-Z])", r"\1_\2", s1)
              return s2.replace("__", "_").lower()

          module_test_map = {
              "Control Networks": "tests/unitTest/control_core_unit_test.py",
              "Geometry": "tests/unitTest/geometry_unit_test.py",
              "High Level Cube I/O": "tests/unitTest/high_level_cube_io_unit_test.py",
              "Low Level Cube I/O": "tests/unitTest/low_level_cube_io_unit_test.py",
              "Map Projection": "tests/unitTest/projection_unit_test.py",
              "Math": "tests/unitTest/math_unit_test.py",
              "Parsing": "tests/unitTest/pvl_unit_test.py",
              "Pattern Matching": "tests/unitTest/pattern_unit_test.py",
              "Spice, Instruments, and Cameras": "tests/unitTest/camera_unit_test.py",
              "Statistics": "tests/unitTest/statistics_unit_test.py",
              "Utility": "tests/unitTest/utility_unit_test.py",
          }
          class_test_overrides = {
              "Cube": "tests/unitTest/cube_unit_test.py",
              "Distance": "tests/unitTest/distance_unit_test.py",
              "Latitude": "tests/unitTest/latitude_unit_test.py",
              "Longitude": "tests/unitTest/longitude_unit_test.py",
              "UniversalGroundMap": "tests/unitTest/universal_ground_map_unit_test.py",
              "InterestOperatorFactory": "tests/unitTest/interest_operator_unit_test.py",
              "SerialNumberList": "tests/unitTest/serial_number_unit_test.py",
              "SerialNumber": "tests/unitTest/serial_number_unit_test.py",
              "ObservationNumber": "tests/unitTest/serial_number_unit_test.py",
              "CameraDetectorMap": "tests/unitTest/camera_maps_unit_test.py",
              "CameraDistortionMap": "tests/unitTest/camera_maps_unit_test.py",
              "CameraFocalPlaneMap": "tests/unitTest/camera_maps_unit_test.py",
              "CameraGroundMap": "tests/unitTest/camera_maps_unit_test.py",
              "CameraSkyMap": "tests/unitTest/camera_maps_unit_test.py",
              "SurfacePoint": "tests/unitTest/surface_point_unit_test.py",
              "Displacement": "tests/unitTest/displacement_unit_test.py",
          }

          rows = []
          with summary_path.open(newline="", encoding="utf-8") as handle:
              reader = csv.DictReader(handle)
              for row in reader:
                  class_name = (row.get("Class") or "").strip()
                  if class_name == target:
                      rows.append(row)

          if not rows:
              raise SystemExit(f"::error::Class '{target}' was not found in {summary_path}")

          if len(rows) > 1:
              categories = ", ".join(sorted((row.get("Module Category") or "").strip() for row in rows))
              raise SystemExit(
                  f"::error::Class '{target}' is ambiguous across module categories: {categories}. "
                  "Use a unique class name or extend the resolver mapping."
              )

          row = rows[0]
          module_category = (row.get("Module Category") or "").strip()
          generated_csv = (row.get("Generated CSV") or "").strip()
          detail_csv = f"class_bind_methods_details/{generated_csv}" if generated_csv else ""
          binding_file = (row.get("Binding") or "").strip()
          source_path = (row.get("Source") or "").strip()
          todo_status = (row.get("Todo Status") or "").strip()
          open_items = (row.get("Open Items") or "").strip()

          if binding_file in {"", "N/A"}:
              binding_file = ""

          default_test = class_test_overrides.get(target)
          if not default_test:
              snake_file = Path("tests/unitTest") / f"{camel_to_snake(target)}_unit_test.py"
              if snake_file.exists():
                  default_test = str(snake_file)
              else:
                  default_test = module_test_map.get(module_category, "")

          unit_test_file = override or default_test
          progress_expected = "1" if todo_status != "已转换" or open_items not in {"", "0"} else "0"

          resolved = {
              "target_class": target,
              "git_ref_override": git_ref_override,
              "pull_request_number": pull_request_number,
              "module_category": module_category,
              "detail_csv": detail_csv,
              "binding_file": binding_file,
              "source_path": source_path,
              "unit_test_file": unit_test_file,
              "progress_expected": progress_expected,
              "todo_status": todo_status,
          }

          Path("resolved-task.json").write_text(
              json.dumps(resolved, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as handle:
              for key, value in resolved.items():
                  handle.write(f"{key}={value}\n")

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary_path.open("a", encoding="utf-8") as summary:
              summary.write("## Resolved pybind task context\n\n")
              summary.write(f"- Target class: `{target}`\n")
              summary.write(f"- Git ref override: `{git_ref_override or 'none'}`\n")
              summary.write(f"- Associated pull request: `{pull_request_number or 'n/a'}`\n")
              summary.write(f"- Module category: `{module_category or 'unknown'}`\n")
              summary.write(f"- Detail CSV: `{detail_csv or 'missing'}`\n")
              summary.write(f"- Binding file: `{binding_file or 'not yet mapped'}`\n")
              summary.write(f"- Upstream source: `{source_path or 'not recorded'}`\n")
              summary.write(f"- Suggested unit test: `{unit_test_file or 'fallback to ctest python-unit-tests'}`\n")
              summary.write(f"- Todo status: `{todo_status or 'unknown'}`\n")
              summary.write(f"- Progress sync expected: `{progress_expected}`\n")
          PY

      - name: Resolve conda-backed ISIS prefix
        uses: ./.github/actions/resolve-conda-isis-prefix
        with:
          runner-mode: ${{ needs.resolve_runner.outputs.runner_mode }}
          fallback-conda-prefix: ${{ env.FALLBACK_CONDA_PREFIX }}
          hosted-conda-prefix: ${{ env.HOSTED_CONDA_PREFIX }}

      - name: Verify local toolchain
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Local environment verification ==="
          echo "CONDA_PREFIX=$CONDA_PREFIX"
          test -d "$CONDA_PREFIX/include/isis" && echo "✓ ISIS headers found"
          test -f "$CONDA_PREFIX/lib/libisis.so" && echo "✓ libisis.so found"
          test -f "$CONDA_PREFIX/lib/Camera.plugin" && echo "✓ Camera.plugin found"
          command -v cmake
          cmake --version
          command -v ninja
          ninja --version
          "$PYTHON_BIN" --version
          "$PYTHON_BIN" - <<'PY'
          import pybind11
          import sys
          print('python', sys.version.split()[0])
          print('pybind11', pybind11.__version__)
          PY

      - name: Clean build directory
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$BUILD_DIR"

      - name: Configure CMake
        shell: bash
        run: |
          set -euo pipefail
          cmake -S "$PYBIND_DIR" -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_VERBOSE_MAKEFILE=ON \
            -DCMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH" \
            -DPython3_EXECUTABLE="$PYTHON_BIN" \
            -DISIS_PREFIX="$ISIS_PREFIX"

      - name: Build extension
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          cmake --build "$BUILD_DIR" --parallel 2 --verbose -- -k 0 2>&1 | tee "$BUILD_DIR/build.log"

      - name: Run targeted unittest or fallback CTest group
        if: ${{ success() }}
        shell: bash
        env:
          RESOLVED_UNIT_TEST: ${{ steps.resolve.outputs.unit_test_file }}
          UNIT_TEST_OVERRIDE: ${{ inputs.unit_test_target_override }}
        run: |
          set -euo pipefail
          set -o pipefail
          export PYTHONPATH="$BUILD_DIR/python${PYTHONPATH:+:$PYTHONPATH}"
          target="$UNIT_TEST_OVERRIDE"
          if [ -z "$target" ]; then
            target="$RESOLVED_UNIT_TEST"
          fi

          if [ -n "$target" ] && [ -f "$target" ]; then
            echo "Running unit test file: $target"
            "$PYTHON_BIN" -X faulthandler "$target" -v 2>&1 | tee "$BUILD_DIR/unit.log"
          elif [ -n "$target" ]; then
            echo "Running unittest target: $target"
            "$PYTHON_BIN" -X faulthandler -m unittest -v "$target" 2>&1 | tee "$BUILD_DIR/unit.log"
          else
            echo "No specific unit test mapping found; falling back to ctest -R python-unit-tests"
            ctest --test-dir "$BUILD_DIR" -R python-unit-tests --output-on-failure 2>&1 | tee "$BUILD_DIR/unit.log"
          fi

      - name: Run smoke_import.py
        if: ${{ success() }}
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          PYTHONPATH="$BUILD_DIR/python${PYTHONPATH:+:$PYTHONPATH}" \
            "$PYTHON_BIN" -X faulthandler tests/smoke_import.py 2>&1 | tee "$BUILD_DIR/smoke.log"

      - name: Validate progress files when binding state likely changed
        if: ${{ success() }}
        shell: bash
        env:
          DETAIL_CSV: ${{ steps.resolve.outputs.detail_csv }}
          BINDING_FILE: ${{ steps.resolve.outputs.binding_file }}
          PROGRESS_EXPECTED: ${{ steps.resolve.outputs.progress_expected }}
          TARGET_CLASS: ${{ steps.resolve.outputs.target_class }}
        run: |
          set -euo pipefail
          source "$AGENT_PYBIND_HELPERS"
          default_branch="${{ github.event.repository.default_branch || 'main' }}"
          retry 5 git fetch origin "$default_branch" --depth=1 >/dev/null 2>&1 || true
          if git rev-parse --verify "origin/$default_branch" >/dev/null 2>&1; then
            base_ref="origin/$default_branch"
          else
            base_ref="HEAD^"
          fi

          diff_files="$(git diff --name-only "$base_ref"...HEAD || true)"
          {
            echo "## Progress consistency check"
            echo ""
            echo "Changed files relative to $base_ref:"
            echo '```text'
            if [ -n "$diff_files" ]; then
              printf '%s\n' "$diff_files"
            else
              echo "(none)"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$PROGRESS_EXPECTED" != "1" ]; then
            echo "Progress sync is not required for $TARGET_CLASS based on current inventory status." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ -z "$diff_files" ]; then
            echo "::notice::No committed changes detected against $base_ref; skipping progress sync enforcement."
            exit 0
          fi

          if ! printf '%s\n' "$diff_files" | grep -Eq '^(src/|python/isis_pybind/__init__\.py)'; then
            echo "No binding/export changes detected; progress sync check skipped." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          changed_progress=0
          if printf '%s\n' "$diff_files" | grep -Fxq 'pybind_progress_log.md'; then
            changed_progress=1
          fi
          if printf '%s\n' "$diff_files" | grep -Fxq 'todo_pybind11.csv'; then
            changed_progress=1
          fi
          if [ -n "$DETAIL_CSV" ] && printf '%s\n' "$diff_files" | grep -Fxq "$DETAIL_CSV"; then
            changed_progress=1
          fi

          if [ "$changed_progress" -ne 1 ]; then
            echo "::error::Binding/export files changed for $TARGET_CLASS but progress artifacts were not updated. Expected one or more of: pybind_progress_log.md, todo_pybind11.csv, $DETAIL_CSV"
            exit 1
          fi

          echo "Progress artifacts updated as expected for $TARGET_CLASS." >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize build failure
        if: ${{ failure() }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import re
          from collections import deque
          from pathlib import Path

          build_log = Path("build/build.log")
          if not build_log.exists():
              print("::warning::Build log not found; skipping failure summary.")
              raise SystemExit(0)

          lines = build_log.read_text(encoding="utf-8", errors="replace").splitlines()
          source_pattern = re.compile(r'([^\s"\']+\.cpp)')
          error_pattern = re.compile(r'(fatal error:| error: |undefined reference to|collect2: error:|ninja: build stopped:)')
          line_number_pattern = re.compile(r'([^\s:]+\.cpp):(\d+)(?::(\d+))?:')

          current_cpp = None
          recent_lines = deque(maxlen=12)
          summaries = []
          seen_keys = set()

          def normalize_path(path_text: str) -> str:
              return path_text.strip().strip('"\'')

          for raw_line in lines:
              line = raw_line.rstrip()
              recent_lines.append(line)
              cpp_matches = source_pattern.findall(line)
              if cpp_matches:
                  current_cpp = normalize_path(cpp_matches[-1])
              if not error_pattern.search(line):
                  continue
              annotated_file = current_cpp or "unknown"
              annotated_line = None
              annotated_col = None
              location_match = line_number_pattern.search(line)
              if location_match:
                  annotated_file = normalize_path(location_match.group(1))
                  annotated_line = location_match.group(2)
                  annotated_col = location_match.group(3)
              key = (annotated_file, line)
              if key in seen_keys:
                  continue
              seen_keys.add(key)
              summaries.append(
                  {
                      "file": annotated_file,
                      "line": annotated_line,
                      "col": annotated_col,
                      "message": line.strip(),
                      "excerpt": "\n".join(recent_lines),
                  }
              )

          if not summaries:
              print("::warning::Build failed, but no compiler-style error summary could be extracted from build.log.")
              raise SystemExit(0)

          job_summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with job_summary_path.open("a", encoding="utf-8") as summary_handle:
              summary_handle.write("## Build failure summary\n\n")
              for index, item in enumerate(summaries[:10], start=1):
                  summary_handle.write(f"### {index}. `{item['file']}`\n\n")
                  summary_handle.write(f"- Error: `{item['message']}`\n")
                  if item["line"]:
                      location = f"line `{item['line']}`"
                      if item["col"]:
                          location += f", column `{item['col']}`"
                      summary_handle.write(f"- Location: {location}\n")
                  summary_handle.write("\n```text\n")
                  summary_handle.write(item["excerpt"])
                  summary_handle.write("\n```\n\n")
                  annotation = f"file={item['file']}"
                  if item["line"]:
                      annotation += f",line={item['line']}"
                  if item["col"]:
                      annotation += f",col={item['col']}"
                  print(f"::error {annotation}::{item['message']}")
          PY

      - name: Write failure summary
        if: ${{ failure() }}
        shell: bash
        run: |
          {
            echo "## Pybind task failure summary"
            echo ""
            echo "- Target class: ${{ steps.resolve.outputs.target_class || inputs.target_class }}"
            echo "- Module category: ${{ steps.resolve.outputs.module_category || 'unknown' }}"
            echo "- Suggested unit test: ${{ steps.resolve.outputs.unit_test_file || '(fallback to ctest python-unit-tests)' }}"
            echo "- Issue: #${{ inputs.issue_number || 'n/a' }}"
            echo "- Pull request: #${{ inputs.pull_request_number || 'n/a' }}"
            echo "- Attempt: ${{ inputs.attempt }} / 5"
            echo "- Required gate: build + unit + smoke + progress"
            echo ""
            echo "If this is attempt 5, mark the issue or PR as blocked, add a blocker summary, and stop automatic repair for this task."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on issue when attempt reaches 5
        if: ${{ failure() && inputs.issue_number != '' && inputs.attempt == '5' }}
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          source "$AGENT_PYBIND_HELPERS"
          curl_bin="$(resolve_curl)"
          body_file="$RUNNER_TEMP/agent-pybind-blocker-comment.md"
          cat > "$body_file" <<EOF
          Automated pybind repair budget reached 5 attempts.

          Target class: ${{ steps.resolve.outputs.target_class || inputs.target_class }}
          Module category: ${{ steps.resolve.outputs.module_category || 'unknown' }}

          Please add a blocker summary with:
          - last failing step
          - most likely root cause
          - classification: binding bug / test bug / environment / upstream behavior / unknown
          - recommended next human action

          This task should stop here and the next task should be selected from the `ready-for-agent` queue.
          EOF

          comment_payload="$(python3 - "$body_file" <<'PY'
          import json
          import pathlib
          import sys
          print(json.dumps({"body": pathlib.Path(sys.argv[1]).read_text(encoding="utf-8")}))
          PY
          )"

          labels_payload='{"labels":["blocked","needs-human-review"]}'
          api_root="https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${{ inputs.issue_number }}"

          retry 4 "$curl_bin" --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$comment_payload" \
            "${api_root}/comments" >/dev/null

          retry 4 "$curl_bin" --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$labels_payload" \
            "${api_root}/labels" >/dev/null
