name: reusable-pybind-build

on:
  workflow_call:
    secrets:
      ACTIONS_CHECKOUT_SSH_KEY:
        required: false
    inputs:
      runner_mode:
        description: Selected runner mode from the shared runner config workflow.
        required: true
        type: string
      runs_on_json:
        description: JSON string suitable for fromJSON(...) in runs-on.
        required: true
        type: string
      use_ssh_checkout:
        description: Legacy compatibility flag for callers that still pass an SSH checkout preference. The reusable workflow now normalizes to HTTPS checkout for WATT/host-routed GitHub access.
        required: true
        type: string
      needs_dynamic_conda_setup:
        description: Whether this workflow should create a micromamba/conda environment on the runner.
        required: true
        type: string
      artifact_prefix:
        description: Prefix used for build/smoke artifact names or self-hosted local cache directories.
        required: true
        type: string
      fallback_conda_prefix:
        description: Fallback local conda prefix used on self-hosted runners.
        required: true
        type: string
      pybind_dir:
        description: Repository-relative source directory passed to cmake -S.
        required: false
        default: .
        type: string
      build_dir:
        description: Repository-relative build output directory.
        required: false
        default: build
        type: string
      run_smoke_import:
        description: Whether to run tests/smoke_import.py after a successful build.
        required: false
        default: true
        type: boolean
      ccache_max_size:
        description: Maximum size for the self-hosted ccache directory, for example 5G or 10G.
        required: false
        default: 10G
        type: string
      upload_build_artifact:
        description: Whether the github-hosted workflow should upload the configured build tree for downstream jobs.
        required: false
        default: true
        type: boolean
      hosted_environment_file:
        description: Conda environment file used when runner-mode=github-hosted.
        required: false
        default: .github/conda/pybind-ci-environment.yml
        type: string
      hosted_environment_name:
        description: Conda environment name used when runner-mode=github-hosted.
        required: false
        default: asp360_new
        type: string
    outputs:
      build_artifact_name:
        description: Uploaded build tree artifact name for github-hosted runs.
        value: ${{ jobs.self_hosted.outputs.build_artifact_name || jobs.github_hosted.outputs.build_artifact_name }}
      build_log_artifact_name:
        description: Uploaded build log artifact name for github-hosted runs.
        value: ${{ jobs.self_hosted.outputs.build_log_artifact_name || jobs.github_hosted.outputs.build_log_artifact_name }}
      smoke_log_artifact_name:
        description: Uploaded smoke log artifact name for github-hosted runs.
        value: ${{ jobs.self_hosted.outputs.smoke_log_artifact_name || jobs.github_hosted.outputs.smoke_log_artifact_name }}
      build_succeeded:
        description: Whether the configure/build stage succeeded.
        value: ${{ jobs.self_hosted.outputs.build_succeeded || jobs.github_hosted.outputs.build_succeeded }}
      smoke_succeeded:
        description: Whether smoke_import.py succeeded when enabled.
        value: ${{ jobs.self_hosted.outputs.smoke_succeeded || jobs.github_hosted.outputs.smoke_succeeded }}
      local_build_cache_dir:
        description: Self-hosted local build cache directory for downstream jobs on the same runner machine.
        value: ${{ jobs.self_hosted.outputs.local_build_cache_dir || jobs.github_hosted.outputs.local_build_cache_dir }}

jobs:
  self_hosted:
    if: ${{ inputs.runner_mode == 'self-hosted' }}
    uses: ./.github/workflows/reusable-pybind-build-self-hosted.yml
    secrets: inherit
    with:
      runner_mode: ${{ inputs.runner_mode }}
      runs_on_json: ${{ inputs.runs_on_json }}
      use_ssh_checkout: ${{ inputs.use_ssh_checkout }}
      needs_dynamic_conda_setup: ${{ inputs.needs_dynamic_conda_setup }}
      artifact_prefix: ${{ inputs.artifact_prefix }}
      fallback_conda_prefix: ${{ inputs.fallback_conda_prefix }}
      pybind_dir: ${{ inputs.pybind_dir }}
      build_dir: ${{ inputs.build_dir }}
      run_smoke_import: ${{ inputs.run_smoke_import }}
      ccache_max_size: ${{ inputs.ccache_max_size }}
      upload_build_artifact: ${{ inputs.upload_build_artifact }}
      hosted_environment_file: ${{ inputs.hosted_environment_file }}
      hosted_environment_name: ${{ inputs.hosted_environment_name }}

  github_hosted:
    if: ${{ inputs.runner_mode == 'github-hosted' }}
    uses: ./.github/workflows/reusable-pybind-build-github-hosted.yml
    secrets: inherit
    with:
      runner_mode: ${{ inputs.runner_mode }}
      runs_on_json: ${{ inputs.runs_on_json }}
      use_ssh_checkout: ${{ inputs.use_ssh_checkout }}
      needs_dynamic_conda_setup: ${{ inputs.needs_dynamic_conda_setup }}
      artifact_prefix: ${{ inputs.artifact_prefix }}
      fallback_conda_prefix: ${{ inputs.fallback_conda_prefix }}
      pybind_dir: ${{ inputs.pybind_dir }}
      build_dir: ${{ inputs.build_dir }}
      run_smoke_import: ${{ inputs.run_smoke_import }}
      upload_build_artifact: ${{ inputs.upload_build_artifact }}
      hosted_environment_file: ${{ inputs.hosted_environment_file }}
      hosted_environment_name: ${{ inputs.hosted_environment_name }}
