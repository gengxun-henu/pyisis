name: CI Pybind

on:
  workflow_dispatch:
    inputs:
      runner_profile:
        description: 'Runner profile override'
        required: false
        default: 'github-hosted'
        type: string
      print_full_method_inventory:
        description: 'Print full method inventory'
        required: true
        default: 'false'
        type: boolean

jobs:
  resolve_runner:
    runs-on: ${{ inputs.runner_profile }}
    steps:
    - name: Checkout
      uses: actions/checkout@v2
    - name: Run tests
      run: pytest tests/

  run_workflow:
    needs: resolve_runner
    uses: ./.github/workflows/runner-config.yml
    with:
      runner_profile: ${{ github.event.inputs.runner_profile }}

  print_inventory:
    needs: run_workflow
    runs-on: ubuntu-latest
    steps:
    - name: Print full method inventory
      run: echo 'Full Inventory'