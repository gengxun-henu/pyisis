# Deprecated legacy fallback workflow.
# Replaced by:
# - .github/workflows/agent-pybind-task.yml
# - .github/workflows/agent-pybind-pr-gate.yml
# Keep this file only as a short-term rollback reference while the new split workflows stabilize.
name: agent-pybind-task-draft (deprecated legacy)

on:
  # Legacy manual-only entry point retained temporarily for rollback and comparison.
  workflow_dispatch:
    inputs:
      issue_number:
        description: "GitHub issue number for this pybind task"
        required: true
        type: string
      target_scope:
        description: "One upstream class or one method cluster only"
        required: true
        type: string
      attempt:
        description: "Automated repair attempt number (1-5)"
        required: true
        default: "1"
        type: string
      unit_test_target:
        description: "Optional unittest target or test file stem, for example tests.unitTest.cube_unit_test or cube_unit_test.CubeBaseMultiplierTest"
        required: false
        default: ""
        type: string
      update_progress:
        description: "Whether this task is expected to update progress artifacts"
        required: true
        default: true
        type: boolean

  # Deprecated: PR gating now lives in .github/workflows/agent-pybind-pr-gate.yml.
  # pull_request:
  #   paths:
  #     - .github/workflows/agent-pybind-task-draft.yml
  #     - .github/ISSUE_TEMPLATE/pybind-task.yml
  #     - .github/copilot-instructions.md
  #     - .github/instructions/**
  #     - CMakeLists.txt
  #     - python/**
  #     - src/**
  #     - tests/**
  #     - todo_pybind11.csv
  #     - pybind_progress_log.md
  #     - class_bind_methods_details/**

concurrency:
  group: agent-pybind-task-${{ github.ref }}-${{ inputs.issue_number || 'manual' }}
  cancel-in-progress: true

jobs:
  resolve_runner:
    name: Resolve runner mode
    uses: ./.github/workflows/reusable-runner-config.yml

  budget-guard:
    name: Budget guard
    needs: resolve_runner
    runs-on: ${{ fromJSON(needs.resolve_runner.outputs.runs_on_json) }}
    steps:
      - name: Validate retry budget
        shell: bash
        run: |
          attempt="${{ inputs.attempt }}"
          if ! [[ "$attempt" =~ ^[0-9]+$ ]]; then
            echo "attempt must be an integer" >&2
            exit 1
          fi
          if [ "$attempt" -lt 1 ] || [ "$attempt" -gt 5 ]; then
            echo "attempt must be between 1 and 5" >&2
            exit 1
          fi
          echo "Attempt $attempt / 5 accepted"

  build:
    name: Configure and build
    runs-on: ${{ fromJSON(needs.resolve_runner.outputs.runs_on_json) }}
    needs:
      - resolve_runner
      - budget-guard
    timeout-minutes: 120
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    env:
      PYBIND_DIR: .
      BUILD_DIR: build
      PYTHONUNBUFFERED: "1"
      FALLBACK_CONDA_PREFIX: ${{ needs.resolve_runner.outputs.fallback_conda_prefix }}
      MAMBA_ROOT_PREFIX: ${{ github.workspace }}/.micromamba
      HOSTED_CONDA_PREFIX: ${{ github.workspace }}/.micromamba/envs/asp360_new
    steps:
      - name: Configure GitHub SSH transport
        if: ${{ needs.resolve_runner.outputs.use_ssh_checkout == 'true' }}
        shell: bash
        env:
          ACTIONS_CHECKOUT_SSH_KEY: ${{ secrets.ACTIONS_CHECKOUT_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${ACTIONS_CHECKOUT_SSH_KEY:-}" ]; then
            echo "::error::Missing secret ACTIONS_CHECKOUT_SSH_KEY. This workflow requires SSH checkout via ssh.github.com:443."
            exit 1
          fi
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          python3 - <<'PY'
          from pathlib import Path

          config_path = Path.home() / ".ssh" / "config"
          begin_marker = "# BEGIN github-actions github ssh\n"
          end_marker = "# END github-actions github ssh\n"
          managed_block = (
              begin_marker
              + "Host github.com\n"
              + "  HostName ssh.github.com\n"
              + "  Port 443\n"
              + "  User git\n"
              + "  IdentitiesOnly yes\n"
              + "  StrictHostKeyChecking no\n"
              + end_marker
          )

          existing = config_path.read_text(encoding="utf-8") if config_path.exists() else ""
          while begin_marker in existing and end_marker in existing:
              start = existing.index(begin_marker)
              end = existing.index(end_marker, start) + len(end_marker)
              existing = existing[:start] + existing[end:]
          existing = existing.lstrip("\n")
          updated = managed_block if not existing else managed_block + "\n" + existing
          config_path.write_text(updated, encoding="utf-8")
          PY
          chmod 600 "$HOME/.ssh/config"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ needs.resolve_runner.outputs.use_ssh_checkout == 'true' && secrets.ACTIONS_CHECKOUT_SSH_KEY || '' }}
          ssh-strict: false
          persist-credentials: true

      - name: Set up micromamba for GitHub-hosted runner
        if: ${{ needs.resolve_runner.outputs.needs_dynamic_conda_setup == 'true' }}
        uses: ./.github/actions/setup-hosted-micromamba
        with:
          environment-name: asp360_new
          environment-file: .github/conda/pybind-ci-environment.yml
          root-prefix: ${{ env.MAMBA_ROOT_PREFIX }}
          target-prefix: ${{ env.HOSTED_CONDA_PREFIX }}

      - name: Resolve conda-backed ISIS prefix
        uses: ./.github/actions/resolve-conda-isis-prefix
        with:
          runner-mode: ${{ needs.resolve_runner.outputs.runner_mode }}
          fallback-conda-prefix: ${{ env.FALLBACK_CONDA_PREFIX }}
          hosted-conda-prefix: ${{ env.HOSTED_CONDA_PREFIX }}

      - name: Verify resolved toolchain
        run: |
          set -euo pipefail
          echo "CONDA_PREFIX: $CONDA_PREFIX"
          "$PYTHON_BIN" --version
          "$PYTHON_BIN" - <<'PY'
          import pybind11
          print(f"pybind11 version: {pybind11.__version__}")
          PY
          cmake --version
          ninja --version

      - name: Clean build directory
        run: rm -rf "$BUILD_DIR"

      - name: Configure CMake
        run: |
          set -euo pipefail
          cmake -S "$PYBIND_DIR" -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH" \
            -DPython3_EXECUTABLE="$PYTHON_BIN" \
            -DISIS_PREFIX="$ISIS_PREFIX"

      - name: Build extension
        run: |
          set -euo pipefail
          cmake --build "$BUILD_DIR" --parallel 2

  unit-tests:
    name: Targeted unit validation
    runs-on: ${{ fromJSON(needs.resolve_runner.outputs.runs_on_json) }}
    needs:
      - resolve_runner
      - build
    timeout-minutes: 60
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    env:
      BUILD_DIR: build
      PYTHONUNBUFFERED: "1"
      FALLBACK_CONDA_PREFIX: ${{ needs.resolve_runner.outputs.fallback_conda_prefix }}
      MAMBA_ROOT_PREFIX: ${{ github.workspace }}/.micromamba
      HOSTED_CONDA_PREFIX: ${{ github.workspace }}/.micromamba/envs/asp360_new
    steps:
      - name: Configure GitHub SSH transport
        if: ${{ needs.resolve_runner.outputs.use_ssh_checkout == 'true' }}
        shell: bash
        env:
          ACTIONS_CHECKOUT_SSH_KEY: ${{ secrets.ACTIONS_CHECKOUT_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${ACTIONS_CHECKOUT_SSH_KEY:-}" ]; then
            echo "::error::Missing secret ACTIONS_CHECKOUT_SSH_KEY. This workflow requires SSH checkout via ssh.github.com:443."
            exit 1
          fi
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          python3 - <<'PY'
          from pathlib import Path

          config_path = Path.home() / ".ssh" / "config"
          begin_marker = "# BEGIN github-actions github ssh\n"
          end_marker = "# END github-actions github ssh\n"
          managed_block = (
              begin_marker
              + "Host github.com\n"
              + "  HostName ssh.github.com\n"
              + "  Port 443\n"
              + "  User git\n"
              + "  IdentitiesOnly yes\n"
              + "  StrictHostKeyChecking no\n"
              + end_marker
          )

          existing = config_path.read_text(encoding="utf-8") if config_path.exists() else ""
          while begin_marker in existing and end_marker in existing:
              start = existing.index(begin_marker)
              end = existing.index(end_marker, start) + len(end_marker)
              existing = existing[:start] + existing[end:]
          existing = existing.lstrip("\n")
          updated = managed_block if not existing else managed_block + "\n" + existing
          config_path.write_text(updated, encoding="utf-8")
          PY
          chmod 600 "$HOME/.ssh/config"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ needs.resolve_runner.outputs.use_ssh_checkout == 'true' && secrets.ACTIONS_CHECKOUT_SSH_KEY || '' }}
          ssh-strict: false
          persist-credentials: true

      - name: Set up micromamba for GitHub-hosted runner
        if: ${{ needs.resolve_runner.outputs.needs_dynamic_conda_setup == 'true' }}
        uses: ./.github/actions/setup-hosted-micromamba
        with:
          environment-name: asp360_new
          environment-file: .github/conda/pybind-ci-environment.yml
          root-prefix: ${{ env.MAMBA_ROOT_PREFIX }}
          target-prefix: ${{ env.HOSTED_CONDA_PREFIX }}

      - name: Resolve conda-backed ISIS prefix
        uses: ./.github/actions/resolve-conda-isis-prefix
        with:
          runner-mode: ${{ needs.resolve_runner.outputs.runner_mode }}
          fallback-conda-prefix: ${{ env.FALLBACK_CONDA_PREFIX }}
          hosted-conda-prefix: ${{ env.HOSTED_CONDA_PREFIX }}

      - name: Rebuild extension for this runner
        run: |
          set -euo pipefail
          cmake -S . -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH" \
            -DPython3_EXECUTABLE="$PYTHON_BIN" \
            -DISIS_PREFIX="$ISIS_PREFIX"
          cmake --build "$BUILD_DIR" --parallel 2

      - name: Run targeted unittest or full CTest group
        run: |
          set -euo pipefail
          export PYTHONPATH="$BUILD_DIR/python${PYTHONPATH:+:$PYTHONPATH}"
          if [ -n "${{ inputs.unit_test_target }}" ]; then
            "$PYTHON_BIN" -X faulthandler -m unittest -v "${{ inputs.unit_test_target }}"
          else
            ctest --test-dir "$BUILD_DIR" -R python-unit-tests --output-on-failure
          fi

  smoke-import:
    name: Smoke import
    runs-on: ${{ fromJSON(needs.resolve_runner.outputs.runs_on_json) }}
    needs:
      - resolve_runner
      - unit-tests
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    env:
      BUILD_DIR: build
      PYTHONUNBUFFERED: "1"
      FALLBACK_CONDA_PREFIX: ${{ needs.resolve_runner.outputs.fallback_conda_prefix }}
      MAMBA_ROOT_PREFIX: ${{ github.workspace }}/.micromamba
      HOSTED_CONDA_PREFIX: ${{ github.workspace }}/.micromamba/envs/asp360_new
    steps:
      - name: Configure GitHub SSH transport
        if: ${{ needs.resolve_runner.outputs.use_ssh_checkout == 'true' }}
        shell: bash
        env:
          ACTIONS_CHECKOUT_SSH_KEY: ${{ secrets.ACTIONS_CHECKOUT_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${ACTIONS_CHECKOUT_SSH_KEY:-}" ]; then
            echo "::error::Missing secret ACTIONS_CHECKOUT_SSH_KEY. This workflow requires SSH checkout via ssh.github.com:443."
            exit 1
          fi
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          python3 - <<'PY'
          from pathlib import Path

          config_path = Path.home() / ".ssh" / "config"
          begin_marker = "# BEGIN github-actions github ssh\n"
          end_marker = "# END github-actions github ssh\n"
          managed_block = (
              begin_marker
              + "Host github.com\n"
              + "  HostName ssh.github.com\n"
              + "  Port 443\n"
              + "  User git\n"
              + "  IdentitiesOnly yes\n"
              + "  StrictHostKeyChecking no\n"
              + end_marker
          )

          existing = config_path.read_text(encoding="utf-8") if config_path.exists() else ""
          while begin_marker in existing and end_marker in existing:
              start = existing.index(begin_marker)
              end = existing.index(end_marker, start) + len(end_marker)
              existing = existing[:start] + existing[end:]
          existing = existing.lstrip("\n")
          updated = managed_block if not existing else managed_block + "\n" + existing
          config_path.write_text(updated, encoding="utf-8")
          PY
          chmod 600 "$HOME/.ssh/config"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ needs.resolve_runner.outputs.use_ssh_checkout == 'true' && secrets.ACTIONS_CHECKOUT_SSH_KEY || '' }}
          ssh-strict: false
          persist-credentials: true

      - name: Set up micromamba for GitHub-hosted runner
        if: ${{ needs.resolve_runner.outputs.needs_dynamic_conda_setup == 'true' }}
        uses: ./.github/actions/setup-hosted-micromamba
        with:
          environment-name: asp360_new
          environment-file: .github/conda/pybind-ci-environment.yml
          root-prefix: ${{ env.MAMBA_ROOT_PREFIX }}
          target-prefix: ${{ env.HOSTED_CONDA_PREFIX }}

      - name: Resolve conda-backed ISIS prefix
        uses: ./.github/actions/resolve-conda-isis-prefix
        with:
          runner-mode: ${{ needs.resolve_runner.outputs.runner_mode }}
          fallback-conda-prefix: ${{ env.FALLBACK_CONDA_PREFIX }}
          hosted-conda-prefix: ${{ env.HOSTED_CONDA_PREFIX }}

      - name: Rebuild extension for this runner
        run: |
          set -euo pipefail
          cmake -S . -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH" \
            -DPython3_EXECUTABLE="$PYTHON_BIN" \
            -DISIS_PREFIX="$ISIS_PREFIX"
          cmake --build "$BUILD_DIR" --parallel 2

      - name: Run smoke_import.py
        run: |
          set -euo pipefail
          PYTHONPATH="$BUILD_DIR/python${PYTHONPATH:+:$PYTHONPATH}" \
            "$PYTHON_BIN" -X faulthandler tests/smoke_import.py

  blocker-summary:
    name: Blocker summary
    runs-on: ${{ fromJSON(needs.resolve_runner.outputs.runs_on_json) }}
    if: failure()
    needs:
      - resolve_runner
      - build
      - unit-tests
      - smoke-import
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Write step summary
        shell: bash
        run: |
          {
            echo "## Pybind task failure summary"
            echo ""
            echo "- Issue: #${{ inputs.issue_number }}"
            echo "- Target scope: ${{ inputs.target_scope }}"
            echo "- Attempt: ${{ inputs.attempt }} / 5"
            echo "- Required gate: build + unit + smoke"
            echo ""
            echo "If this is attempt 5, mark the issue or PR as blocked, add a blocker summary, and stop automatic repair for this task."
            echo "Next task should come from the ready-for-agent queue."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on issue when attempt reaches 5
        if: ${{ inputs.issue_number != '' && inputs.attempt == '5' }}
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number('${{ inputs.issue_number }}');
            async function removeLabelIfPresent(name) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name,
                });
              }
              catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }
            const body = [
              'Automated pybind repair budget reached 5 attempts.',
              '',
              `Target scope: ${{ inputs.target_scope }}`,
              '',
              'Please add a blocker summary with:',
              '- last failing step',
              '- most likely root cause',
              '- classification: binding bug / test bug / environment / upstream behavior / unknown',
              '- recommended next human action',
              '',
              'This task should stop here and the next task should be selected from the `ready-for-agent` queue.'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['blocked', 'needs-human-review']
            });
            await removeLabelIfPresent('agent-active');
            await removeLabelIfPresent('ready-for-agent');
