name: agent-pybind-pr-gate

on:
  pull_request:
    paths:
      - .github/workflows/agent-pybind-*.yml
      - .github/workflows/reusable-runner-config.yml
      - .github/workflows/reusable-pybind-build.yml
      - .github/workflows/reusable-pybind-build-self-hosted.yml
      - .github/workflows/reusable-pybind-build-github-hosted.yml
      - .github/workflows/dispatch-pybind-task-from-issue.yml
      - .github/ISSUE_TEMPLATE/pybind-task.yml
      - .github/actions/resolve-runner-config/**
      - .github/actions/resolve-conda-isis-prefix/**
      - .github/actions/setup-hosted-micromamba/**
      - .github/actions/normalized-safe-checkout/**
      - .github/runner-config.yml
      - .github/conda/**
      - .github/copilot-instructions.md
      - .github/instructions/**
      - CMakeLists.txt
      - scripts/build_log_analyzer.py
      - python/**
      - src/**
      - tests/**
      - todo_pybind11.csv
      - pybind_progress_log.md
      - class_bind_methods_details/**

concurrency:
  group: agent-pybind-pr-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  resolve_runner:
    name: Resolve runner mode
    uses: ./.github/workflows/reusable-runner-config.yml
    with:
      runner_profile: github-hosted

  prepare:
    name: Prepare PR context
    needs: resolve_runner
    runs-on: ${{ fromJSON(needs.resolve_runner.outputs.runs_on_json) }}
    outputs:
      changed_tests: ${{ steps.diff.outputs.changed_tests }}
    steps:
      - name: Normalize GitHub checkout transport before checkout
        shell: bash
        run: |
          set -euo pipefail

          cleanup_git_insteadof() {
            local scope="$1"
            local output
            output="$(git config "$scope" --get-regexp '^url\..*\.insteadof$' 2>/dev/null || true)"
            if [ -z "$output" ]; then
              return 0
            fi

            while IFS= read -r line; do
              [ -n "$line" ] || continue
              key="${line%% *}"
              value="${line#* }"
              case "$value" in
                git@github.com:*|git@ssh.github.com:*|ssh://git@github.com/*|ssh://git@ssh.github.com:443/*)
                  git config "$scope" --unset-all "$key" || true
                  ;;
              esac
            done <<< "$output"
          }

          cleanup_git_insteadof --global
          cleanup_git_insteadof --system

          python3 - <<'PY'
          from pathlib import Path

          config_path = Path.home() / ".ssh" / "config"
          begin_marker = "# BEGIN github-actions github ssh\n"
          end_marker = "# END github-actions github ssh\n"

          if not config_path.exists():
              raise SystemExit(0)

          existing = config_path.read_text(encoding="utf-8")
          while begin_marker in existing and end_marker in existing:
              start = existing.index(begin_marker)
              end = existing.index(end_marker, start) + len(end_marker)
              existing = existing[:start] + existing[end:]
          config_path.write_text(existing.lstrip("\n"), encoding="utf-8")
          PY

          if [ -f "$HOME/.ssh/config" ]; then
            chmod 600 "$HOME/.ssh/config"
          fi

      - name: Preflight GitHub HTTPS checkout path on self-hosted runner
        if: ${{ needs.resolve_runner.outputs.runner_mode == 'self-hosted' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            local delay=5
            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${attempt} attempts: $*" >&2
                return 1
              fi
              echo "Attempt ${attempt}/${max_attempts} failed, retrying in ${delay}s: $*" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          auth_header="$(python3 - <<'PY'
          import base64
          import os
          print(base64.b64encode(f"x-access-token:{os.environ['GH_TOKEN']}".encode()).decode())
          PY
          )"

          retry 4 curl --fail --silent --show-error --location --head --connect-timeout 10 --max-time 30 https://github.com >/dev/null
          retry 4 curl --fail --silent --show-error --location --head --connect-timeout 10 --max-time 30 https://api.github.com >/dev/null
          retry 4 git -c http.sslVerify=true -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" HEAD >/dev/null

      - name: Self-heal stale checkout workspace on self-hosted runner
        if: ${{ needs.resolve_runner.outputs.runner_mode == 'self-hosted' }}
        shell: bash
        run: |
          set -euo pipefail

          workspace_dir="${GITHUB_WORKSPACE:?}"
          if [ ! -d "$workspace_dir/.git" ]; then
            echo "No existing .git directory detected under $workspace_dir; workspace is already clean enough."
            exit 0
          fi

          if git -C "$workspace_dir" rev-parse --verify HEAD >/dev/null 2>&1; then
            echo "Existing checkout HEAD is healthy; no cleanup required."
            exit 0
          fi

          echo "::warning::Detected stale or corrupt checkout metadata in $workspace_dir (HEAD is missing). Removing workspace contents before actions/checkout."
          find "$workspace_dir" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Report checkout transport diagnostics
        uses: ./.github/actions/normalized-safe-checkout
        with:
          runner-mode: ${{ needs.resolve_runner.outputs.runner_mode }}
          github-token: ${{ github.token }}
          skip-checkout: "true"
          summary-context: pr-gate-prepare

      - name: Summarize changed files
        id: diff
        shell: bash
        run: |
          set -euo pipefail
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          changed_files="$(git diff --name-only "$base_sha" "$head_sha")"

          changed_tests=$(printf '%s\n' "$changed_files" | grep '^tests/unitTest/.*_unit_test\.py$' || true)
          {
            echo 'changed_tests<<EOF'
            printf '%s\n' "$changed_tests"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          {
            echo "## PR gate change summary"
            echo ""
            echo "Base SHA: \`$base_sha\`"
            echo "Head SHA: \`$head_sha\`"
            echo ""
            echo "### Changed files"
            echo "```text"
            printf '%s\n' "$changed_files"
            echo "```"
          } >> "$GITHUB_STEP_SUMMARY"

  build_and_smoke:
    name: Build and smoke gate
    needs:
      - resolve_runner
      - prepare
    uses: ./.github/workflows/reusable-pybind-build.yml
    secrets: inherit
    with:
      runner_mode: ${{ needs.resolve_runner.outputs.runner_mode }}
      runs_on_json: ${{ needs.resolve_runner.outputs.runs_on_json }}
      use_ssh_checkout: 'false'
      needs_dynamic_conda_setup: ${{ needs.resolve_runner.outputs.needs_dynamic_conda_setup }}
      artifact_prefix: pr-gate
      fallback_conda_prefix: ${{ needs.resolve_runner.outputs.fallback_conda_prefix }}
      pybind_dir: .
      build_dir: build
      run_smoke_import: true
      upload_build_artifact: true

  unit-tests:
    name: Python unit-test gate
    needs:
      - resolve_runner
      - build_and_smoke
      - prepare
    if: ${{ always() && needs.build_and_smoke.outputs.build_succeeded == 'true' }}
    runs-on: ${{ fromJSON(needs.resolve_runner.outputs.runs_on_json) }}
    timeout-minutes: 90
    permissions:
      contents: read
    env:
      BUILD_DIR: build
      PYTHONUNBUFFERED: "1"
      FALLBACK_CONDA_PREFIX: ${{ needs.resolve_runner.outputs.fallback_conda_prefix }}
      CHANGED_TESTS: ${{ needs.prepare.outputs.changed_tests }}
      MAMBA_ROOT_PREFIX: ${{ github.workspace }}/.micromamba
      HOSTED_CONDA_PREFIX: ${{ github.workspace }}/.micromamba/envs/asp360_new
    steps:
      - name: Normalize GitHub checkout transport before checkout
        shell: bash
        run: |
          set -euo pipefail

          cleanup_git_insteadof() {
            local scope="$1"
            local output
            output="$(git config "$scope" --get-regexp '^url\..*\.insteadof$' 2>/dev/null || true)"
            if [ -z "$output" ]; then
              return 0
            fi

            while IFS= read -r line; do
              [ -n "$line" ] || continue
              key="${line%% *}"
              value="${line#* }"
              case "$value" in
                git@github.com:*|git@ssh.github.com:*|ssh://git@github.com/*|ssh://git@ssh.github.com:443/*)
                  git config "$scope" --unset-all "$key" || true
                  ;;
              esac
            done <<< "$output"
          }

          cleanup_git_insteadof --global
          cleanup_git_insteadof --system

          python3 - <<'PY'
          from pathlib import Path

          config_path = Path.home() / ".ssh" / "config"
          begin_marker = "# BEGIN github-actions github ssh\n"
          end_marker = "# END github-actions github ssh\n"

          if not config_path.exists():
              raise SystemExit(0)

          existing = config_path.read_text(encoding="utf-8")
          while begin_marker in existing and end_marker in existing:
              start = existing.index(begin_marker)
              end = existing.index(end_marker, start) + len(end_marker)
              existing = existing[:start] + existing[end:]
          config_path.write_text(existing.lstrip("\n"), encoding="utf-8")
          PY

          if [ -f "$HOME/.ssh/config" ]; then
            chmod 600 "$HOME/.ssh/config"
          fi

      - name: Preflight GitHub HTTPS checkout path on self-hosted runner
        if: ${{ needs.resolve_runner.outputs.runner_mode == 'self-hosted' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            local delay=5
            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${attempt} attempts: $*" >&2
                return 1
              fi
              echo "Attempt ${attempt}/${max_attempts} failed, retrying in ${delay}s: $*" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          auth_header="$(python3 - <<'PY'
          import base64
          import os
          print(base64.b64encode(f"x-access-token:{os.environ['GH_TOKEN']}".encode()).decode())
          PY
          )"

          retry 4 curl --fail --silent --show-error --location --head --connect-timeout 10 --max-time 30 https://github.com >/dev/null
          retry 4 curl --fail --silent --show-error --location --head --connect-timeout 10 --max-time 30 https://api.github.com >/dev/null
          retry 4 git -c http.sslVerify=true -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" HEAD >/dev/null

      - name: Self-heal stale checkout workspace on self-hosted runner
        if: ${{ needs.resolve_runner.outputs.runner_mode == 'self-hosted' }}
        shell: bash
        run: |
          set -euo pipefail

          workspace_dir="${GITHUB_WORKSPACE:?}"
          if [ ! -d "$workspace_dir/.git" ]; then
            echo "No existing .git directory detected under $workspace_dir; workspace is already clean enough."
            exit 0
          fi

          if git -C "$workspace_dir" rev-parse --verify HEAD >/dev/null 2>&1; then
            echo "Existing checkout HEAD is healthy; no cleanup required."
            exit 0
          fi

          echo "::warning::Detected stale or corrupt checkout metadata in $workspace_dir (HEAD is missing). Removing workspace contents before actions/checkout."
          find "$workspace_dir" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Report checkout transport diagnostics
        uses: ./.github/actions/normalized-safe-checkout
        with:
          runner-mode: ${{ needs.resolve_runner.outputs.runner_mode }}
          github-token: ${{ github.token }}
          skip-checkout: "true"
          summary-context: pr-gate-unit-tests

      - name: Set up micromamba for GitHub-hosted runner
        if: ${{ needs.resolve_runner.outputs.needs_dynamic_conda_setup == 'true' }}
        uses: ./.github/actions/setup-hosted-micromamba
        with:
          environment-name: asp360_new
          environment-file: .github/conda/pybind-ci-environment.yml
          root-prefix: ${{ env.MAMBA_ROOT_PREFIX }}
          target-prefix: ${{ env.HOSTED_CONDA_PREFIX }}

      - name: Resolve conda-backed ISIS prefix
        uses: ./.github/actions/resolve-conda-isis-prefix
        with:
          runner-mode: ${{ needs.resolve_runner.outputs.runner_mode }}
          fallback-conda-prefix: ${{ env.FALLBACK_CONDA_PREFIX }}
          hosted-conda-prefix: ${{ env.HOSTED_CONDA_PREFIX }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build_and_smoke.outputs.build_artifact_name }}
          path: ${{ env.BUILD_DIR }}

      - name: Run changed unit tests or fallback CTest python group
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          export PYTHONPATH="$BUILD_DIR/python${PYTHONPATH:+:$PYTHONPATH}"

          if [ -n "$CHANGED_TESTS" ]; then
            : > "$BUILD_DIR/unit.log"
            while IFS= read -r test_file; do
              [ -z "$test_file" ] && continue
              echo "=== Running $test_file ===" | tee -a "$BUILD_DIR/unit.log"
              "$PYTHON_BIN" -X faulthandler "$test_file" -v 2>&1 | tee -a "$BUILD_DIR/unit.log"
            done <<< "$CHANGED_TESTS"
          else
            echo "No changed unit-test files detected; running ctest -R python-unit-tests" | tee "$BUILD_DIR/unit.log"
            ctest --test-dir "$BUILD_DIR" -R python-unit-tests --output-on-failure 2>&1 | tee -a "$BUILD_DIR/unit.log"
          fi

      - name: Upload unit test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-gate-unit-logs-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            ${{ env.BUILD_DIR }}/unit.log
            ${{ env.BUILD_DIR }}/Testing/Temporary/**

  metadata-audit:
    name: Metadata audit
    runs-on: ${{ fromJSON(needs.resolve_runner.outputs.runs_on_json) }}
    needs:
      - resolve_runner
      - prepare
    permissions:
      contents: read
    steps:
      - name: Normalize GitHub checkout transport before checkout
        shell: bash
        run: |
          set -euo pipefail

          cleanup_git_insteadof() {
            local scope="$1"
            local output
            output="$(git config "$scope" --get-regexp '^url\..*\.insteadof$' 2>/dev/null || true)"
            if [ -z "$output" ]; then
              return 0
            fi

            while IFS= read -r line; do
              [ -n "$line" ] || continue
              key="${line%% *}"
              value="${line#* }"
              case "$value" in
                git@github.com:*|git@ssh.github.com:*|ssh://git@github.com/*|ssh://git@ssh.github.com:443/*)
                  git config "$scope" --unset-all "$key" || true
                  ;;
              esac
            done <<< "$output"
          }

          cleanup_git_insteadof --global
          cleanup_git_insteadof --system

          python3 - <<'PY'
          from pathlib import Path

          config_path = Path.home() / ".ssh" / "config"
          begin_marker = "# BEGIN github-actions github ssh\n"
          end_marker = "# END github-actions github ssh\n"

          if not config_path.exists():
              raise SystemExit(0)

          existing = config_path.read_text(encoding="utf-8")
          while begin_marker in existing and end_marker in existing:
              start = existing.index(begin_marker)
              end = existing.index(end_marker, start) + len(end_marker)
              existing = existing[:start] + existing[end:]
          config_path.write_text(existing.lstrip("\n"), encoding="utf-8")
          PY

          if [ -f "$HOME/.ssh/config" ]; then
            chmod 600 "$HOME/.ssh/config"
          fi

      - name: Preflight GitHub HTTPS checkout path on self-hosted runner
        if: ${{ needs.resolve_runner.outputs.runner_mode == 'self-hosted' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            local delay=5
            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${attempt} attempts: $*" >&2
                return 1
              fi
              echo "Attempt ${attempt}/${max_attempts} failed, retrying in ${delay}s: $*" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          auth_header="$(python3 - <<'PY'
          import base64
          import os
          print(base64.b64encode(f"x-access-token:{os.environ['GH_TOKEN']}".encode()).decode())
          PY
          )"

          retry 4 curl --fail --silent --show-error --location --head --connect-timeout 10 --max-time 30 https://github.com >/dev/null
          retry 4 curl --fail --silent --show-error --location --head --connect-timeout 10 --max-time 30 https://api.github.com >/dev/null
          retry 4 git -c http.sslVerify=true -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" HEAD >/dev/null

      - name: Self-heal stale checkout workspace on self-hosted runner
        if: ${{ needs.resolve_runner.outputs.runner_mode == 'self-hosted' }}
        shell: bash
        run: |
          set -euo pipefail

          workspace_dir="${GITHUB_WORKSPACE:?}"
          if [ ! -d "$workspace_dir/.git" ]; then
            echo "No existing .git directory detected under $workspace_dir; workspace is already clean enough."
            exit 0
          fi

          if git -C "$workspace_dir" rev-parse --verify HEAD >/dev/null 2>&1; then
            echo "Existing checkout HEAD is healthy; no cleanup required."
            exit 0
          fi

          echo "::warning::Detected stale or corrupt checkout metadata in $workspace_dir (HEAD is missing). Removing workspace contents before actions/checkout."
          find "$workspace_dir" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Report checkout transport diagnostics
        uses: ./.github/actions/normalized-safe-checkout
        with:
          runner-mode: ${{ needs.resolve_runner.outputs.runner_mode }}
          github-token: ${{ github.token }}
          skip-checkout: "true"
          summary-context: pr-gate-metadata-audit

      - name: Audit progress/export metadata changes
        shell: bash
        run: |
          set -euo pipefail
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          changed_files="$(git diff --name-only "$base_sha" "$head_sha")"

          src_changed=0
          metadata_changed=0
          if printf '%s\n' "$changed_files" | grep -Eq '^(src/|python/isis_pybind/__init__\.py)'; then
            src_changed=1
          fi
          if printf '%s\n' "$changed_files" | grep -Eq '^(pybind_progress_log\.md|todo_pybind11\.csv|class_bind_methods_details/)'; then
            metadata_changed=1
          fi

          {
            echo "## Metadata audit"
            echo ""
            if [ "$src_changed" -eq 1 ] && [ "$metadata_changed" -eq 0 ]; then
              echo "- Warning: binding/export files changed without progress metadata updates. This may be fine for bug-fix-only PRs, but please double-check inventory sync."
              echo "::warning::Binding/export files changed without progress metadata updates."
            else
              echo "- Metadata consistency looks reasonable for this PR."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
